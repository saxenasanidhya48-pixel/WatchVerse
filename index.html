<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WatchVerse</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="matrix-header">
    <span class="header-title">⚡ MATRIX AESTHETICS:</span>
    <button onclick="setTheme('cherry-blossom')">🌸 Cherry Blossom</button>
    <button onclick="setTheme('midnight-orchid')">🌙 Midnight Orchid</button>
    <button onclick="setTheme('cyber-lotus')">🌿 Cyber Lotus</button>
</div>
<div class="background"></div>

<header class="header">

<div class="logo">
🎬 WatchVerse
</div>

<div class="theme-switcher">

</header>

<section class="hero">

<h1>
Track Movies, Web Series & Anime
</h1>

<p>
Your personal entertainment universe.
</p>

</section>

<section class="stats">

<div class="card">
<h2 id="totalEntries">0</h2>
<p>Total Entries</p>
</div>

<div class="card">
<h2 id="watchedCount">0</h2>
<p>Watched</p>
</div>

<div class="card">
<h2 id="planCount">0</h2>
<p>Plan To Watch</p>
</div>

</section>

<section class="container">

<div class="form-box">

<h2>Add New Entry</h2>
<select id="type">
<option>Movie</option>
<option>Web Series</option>
<option>Anime</option>
</select>

<input
type="text"
id="title"
placeholder="Movie / Series Title"
>

<select id="genre">
<option value="">Select Genre</option>
<option>Action</option>
<option>Adventure</option>
<option>Comedy</option>
<option>Drama</option>
<option>Romance</option>
<option>Sci-Fi</option>
<option>Fantasy</option>
<option>Horror</option>
<option>Thriller</option>
<option>Crime</option>
<option>Mystery</option>
<option>Animation</option>
<option>Documentary</option>
</select>

<select id="platform">
<option value="">Select Platform</option>
<option>Netflix</option>
<option>Amazon Prime Video</option>
<option>Disney+</option>
<option>JioHotstar</option>
<option>Sony LIV</option>
<option>Apple TV+</option>
<option>Crunchyroll</option>
<option>YouTube</option>
</select>

<select id="rating">
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Very Good</option>
<option value="3">⭐⭐⭐ Good</option>
<option value="2">⭐⭐ Average</option>
<option value="1">⭐ Poor</option>
</select>

<select id="status">
<option>Watched</option>
<option>Watching</option>
<option>Plan To Watch</option>
<option>Dropped</option>
<option>On Hold</option>
</select>

<select id="seasonStatus">
<option>Ended</option>
<option>In Production</option>
<option>Season 2</option>
<option>Season 3</option>
<option>Season 4+</option>
</select>

<textarea
id="notes"
placeholder="Personal Notes"
></textarea>

<button id="addBtn">
➕ Add Entry
</button>
<select id="type">
<option>Movie</option>
<option>Web Series</option>
<option>Anime</option>
</select>

<input
type="text"
id="title"
placeholder="Title"
>

<input
type="text"
id="genre"
placeholder="Genre"
>

<input
type="text"
id="platform"
placeholder="Platform"
>

<input
type="number"
id="rating"
min="1"
max="10"
placeholder="Rating (1-10)"
>

<select id="status">
<option>Watched</option>
<option>Plan To Watch</option>
</select>

<textarea
id="notes"
placeholder="Notes"
></textarea>

<button id="addBtn">
➕ Add Entry
</button>

</div>

<div class="content-box">

<div class="top-tools">

<input
type="text"
id="search"
placeholder="Search..."
>

</div>

<div id="entries">

</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
